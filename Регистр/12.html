<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание аккаунта</title>
    <link rel="stylesheet" href="12.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Создать аккаунт</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username"><span class="icon-user"></span> Имя пользователя</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email"><span class="icon-email"></span> Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password"><span class="icon-lock"></span> Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password"><span class="icon-lock"></span> Подтвердите пароль</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>
            <div class="already-account">
                <p>Уже есть аккаунт? <a href="1254.html">Войти</a></p>
            </div>
        </div>
    </div>
</body>
</html>
