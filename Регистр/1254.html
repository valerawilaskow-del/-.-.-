<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт</title>
    <link rel="stylesheet" href="1254.css">
</head>
<body>
    <div class="login-container">
        <h2>Вход в аккаунт</h2>
        <form action="#" method="POST">
            <div class="input-group">
                <span class="icon-email"></span>
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <span class="icon-lock"></span>
                <input type="password" placeholder="Пароль" required>
            </div>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember"> Запомнить меня
                </label>
                <a href="#">Забыли пароль?</a>
            </div>
            <button type="submit">Войти</button>
        </form>
        <div class="social-login">
            <p>Или войдите через</p>
            <div class="social-buttons">
                <button class="social-btn google">G</button>
                <button class="social-btn vk">VK</button>
                <button class="social-btn telegram">TG</button>
            </div>
        </div>
        <div class="register-link">
            <p>Нет аккаунта?</p> <a href="12.html">Зарегистрироваться</a></p>
        </div>
    </div>
</body>
</html>
