<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — GameSadyg</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span class="header__logo-icon">▶</span> GameSadyg
      </a>
      <nav class="header__nav">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="login.html" class="header__nav-link">Войти</a>
      </nav>
    </div>
  </header>

  <main class="form-page">
    <form class="form form--wide" action="#" method="post">
      <h1 class="form__title">Регистрация</h1>

      <div class="form__group">
        <label for="email" class="form__label">E-mail *</label>
        <input type="email" id="email" name="email" class="form__input" required>
      </div>

      <div class="form__row">
        <div class="form__group">
          <label for="lastname" class="form__label">Фамилия *</label>
          <input type="text" id="lastname" name="lastname" class="form__input" required>
        </div>
        <div class="form__group">
          <label for="firstname" class="form__label">Имя *</label>
          <input type="text" id="firstname" name="firstname" class="form__input" required>
        </div>
      </div>

      <div class="form__row">
        <div class="form__group">
          <label for="birthdate" class="form__label">Дата рождения *</label>
          <input type="date" id="birthdate" name="birthdate" class="form__input" required>
        </div>
        <div class="form__group">
          <label for="phone" class="form__label">Номер телефона *</label>
          <input type="tel" id="phone" name="phone" class="form__input" required placeholder="+7 (___) ___-__-__">
        </div>
      </div>

      <div class="form__row">
        <div class="form__group">
          <label for="password" class="form__label">Пароль *</label>
          <input type="password" id="password" name="password" class="form__input" required minlength="6">
        </div>
        <div class="form__group">
          <label for="password2" class="form__label">Повтор пароля *</label>
          <input type="password" id="password2" name="password2" class="form__input" required minlength="6">
        </div>
      </div>

      <div class="form__group">
        <label class="form__checkbox">
          <input type="checkbox" required>
          <span>Я согласен на обработку персональных данных</span>
        </label>
      </div>

      <button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button>
      <a href="login.html" class="form__link">Уже есть аккаунт? Войти</a>
    </form>
  </main>

</body>
</html>
