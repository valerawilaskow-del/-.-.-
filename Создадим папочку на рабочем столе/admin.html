<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — GameSadyg</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span class="header__logo-icon">▶</span> GameSadyg
      </a>
      <nav class="header__nav">
        <a href="index.html" class="header__nav-link">На сайт</a>
        <a href="profile.html" class="header__nav-link">Кабинет</a>
      </nav>
    </div>
  </header>

  <main class="form-page">
    <form class="form form--wide" action="#" method="post" enctype="multipart/form-data">
      <h1 class="form__title">Добавление новой игры</h1>

      <div class="form__group">
        <label for="title" class="form__label">Название игры</label>
        <input type="text" id="title" name="title" class="form__input" required>
      </div>

      <div class="form__row">
        <div class="form__group">
          <label for="genre" class="form__label">Жанр</label>
          <select id="genre" name="genre" class="form__select" required>
            <option value="">Выберите жанр</option>
            <option>Экшен</option>
            <option>RPG</option>
            <option>Шутер</option>
            <option>Стратегия</option>
            <option>Симулятор</option>
          </select>
        </div>
        <div class="form__group">
          <label for="developer" class="form__label">Компания-разработчик</label>
          <input type="text" id="developer" name="developer" class="form__input" required>
        </div>
      </div>

      <div class="form__group">
        <label for="image" class="form__label">Изображение</label>
        <input type="file" id="image" name="image" class="form__input" accept="image/*" required>
      </div>

      <div class="form__group">
        <label for="description" class="form__label">Описание</label>
        <textarea id="description" name="description" class="form__textarea" required></textarea>
      </div>

      <div class="form__group">
        <label for="price" class="form__label">Стоимость (₽)</label>
        <input type="number" id="price" name="price" class="form__input" min="0" required>
      </div>

      <button type="submit" class="btn btn--primary btn--full">Добавить</button>
    </form>
  </main>

</body>
</html>
