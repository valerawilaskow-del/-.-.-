<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — GameSadyg</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span class="header__logo-icon">▶</span> GameSadyg
      </a>
      <nav class="header__nav">
        <a href="index.html" class="header__nav-link">Главная</a>
        <a href="register.html" class="header__nav-link">Регистрация</a>
      </nav>
    </div>
  </header>

  <main class="form-page">
    <form class="form" action="#" method="post">
      <h1 class="form__title">Вход в аккаунт</h1>

      <div class="form__group">
        <label for="email" class="form__label">E-mail</label>
        <input type="email" id="email" name="email" class="form__input" required placeholder="example@mail.ru">
      </div>

      <div class="form__group">
        <label for="password" class="form__label">Пароль</label>
        <input type="password" id="password" name="password" class="form__input" required placeholder="Введите пароль">
      </div>

      <button type="submit" class="btn btn--primary btn--full">Войти</button>

      <a href="#" class="form__link">Забыли пароль?</a>
      <a href="register.html" class="form__link">Нет аккаунта? Зарегистрироваться</a>
    </form>
  </main>

</body>
</html>
