<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
</head>

<body>
    <style>
        .red {
            color: red;
        }

        .zzz {
            font-style: italic;
        }
    </style>

    <p class="zzz red" id="test">text</p>

    <button id="btn">Удалить красный цвет</button>
    <script>
        $(function () {
            $('#btn').click(function () {
                $('#test').toggleClass('red', false);
            });
        });
    </script>

</body>

</html>
