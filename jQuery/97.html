<!DOCTYPE html>
<html>
<head>
  <script src="jquery.js"></script>
</head>
<body>

  <h3>Задача 1 — дописать href при наведении</h3>
  <a href="https://google.com">Google</a><br>
  <a href="https://youtube.com">YouTube</a><br>
  <a href="https://github.com">GitHub</a>

  <h3>Задача 2 — вывести value при потере фокуса</h3>
  <input type="text" placeholder="Первый"><br>
  <input type="text" placeholder="Второй"><br>
  <input type="text" placeholder="Третий"><br>
  <p id="test"></p>

  <script>
    // Задача 1
    $('a').on('mouseenter', function() {
      var href = $(this).attr('href');
      var text = $(this).text();
      $(this).text(text + ' (' + href + ')');
    });

    // Задача 2
    $('input').on('blur', function() {
      $('#test').text($(this).val());
    });
  </script>

</body>
</html>
