<!DOCTYPE html>
<html>
<head>
   <script src="jquery.js"></script>
</head>
<body>

  <h3>Задача 1 — дописать href только один раз</h3>
  <a href="https://google.com">Google</a><br>
  <a href="https://youtube.com">YouTube</a><br>
  <a href="https://github.com">GitHub</a>

  <h3>Задача 2 — алерт только по первому нажатию</h3>
  <input type="text" placeholder="Первый"><br>
  <input type="text" placeholder="Второй"><br>
  <input type="text" placeholder="Третий"><br>

  <h3>Задача 3 — квадрат по клику, удвоение по двойному</h3>
  <p class="num">3</p>
  <p class="num">7</p>
  <p class="num">12</p>

  <script>
    // Задача 1
    document.querySelectorAll('a').forEach(function(a) {
      function addHref() {
        a.textContent = a.textContent + ' (' + a.getAttribute('href') + ')';
        a.removeEventListener('mouseenter', addHref);
      }
      a.addEventListener('mouseenter', addHref);
    });

    // Задача 2
    document.querySelectorAll('input').forEach(function(input) {
      function showAlert() {
        alert(input.value);
        input.removeEventListener('click', showAlert);
      }
      input.addEventListener('click', showAlert);
    });

    // Задача 3
    document.querySelectorAll('.num').forEach(function(p) {
      var clicked = false;
      var dblclicked = false;

      p.addEventListener('click', function() {
        if (!clicked) {
          var n = parseInt(p.textContent);
          p.textContent = n * n;
          clicked = true;
        }
      });

      p.addEventListener('dblclick', function() {
        if (!dblclicked) {
          var n = parseInt(p.textContent);
          p.textContent = n * 2;
          dblclicked = true;
        }
      });
    });
  </script>

</body>
</html>
