<!DOCTYPE html>
<html>
<head>
  <script src="jquery.js"></script>
</head>
<body>

  <h3>Задача 1 — дописать href только один раз</h3>
  <a href="https://google.com">Google</a><br>
  <a href="https://youtube.com">YouTube</a><br>
  <a href="https://github.com">GitHub</a>

  <h3>Задача 2 — алерт только по первому нажатию</h3>
  <input type="text" placeholder="Первый"><br>
  <input type="text" placeholder="Второй"><br>
  <input type="text" placeholder="Третий"><br>

  <h3>Задача 3 — квадрат по клику, удвоение по двойному</h3>
  <p class="num">3</p>
  <p class="num">7</p>
  <p class="num">12</p>

  <h3>Задача 4 — добавить '!' только один раз</h3>
  <p class="para">Первый абзац</p>
  <p class="para">Второй абзац</p>
  <p class="para">Третий абзац</p>

  <script>
    // Задача 1
    $('a').one('mouseenter', function() {
      var href = $(this).attr('href');
      $(this).text($(this).text() + ' (' + href + ')');
    });

    // Задача 2
    $('input').one('click', function() {
      alert($(this).val());
    });

    // Задача 3
    $('.num').one('click', function() {
      var n = parseInt($(this).text());
      $(this).text(n * n);
    });

    $('.num').one('dblclick', function() {
      var n = parseInt($(this).text());
      $(this).text(n * 2);
    });

    // Задача 4
    $('.para').one('click', function() {
      $(this).text($(this).text() + '!');
    });
  </script>

</body>
</html>
