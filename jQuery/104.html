<!DOCTYPE html>
<html>
<head>
  <script src="jquery.js"></script>
  <style>
    body { font-size: 18px; }
    a { color: blue; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ol { margin: 0px; padding-left: 10px; }
    li { list-style-type: inside; }
    div { display: inline-block; padding: 30px; border: 1px solid black; cursor: pointer; margin-bottom: 20px; }
  </style>
</head>
<body>

  <p>
    <a id="hide" href="">hide</a>
    <a id="show" href="">show</a>
  </p>
  <div id="block">
    <ol>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
      <li>text</li>
    </ol>
  </div>

  <script>
    $('#hide').on('click', function(e) {
      e.preventDefault();
      $('#block').hide(600);
    });

    $('#show').on('click', function(e) {
      e.preventDefault();
      $('#block').show(600);
    });
  </script>

</body>
</html>
