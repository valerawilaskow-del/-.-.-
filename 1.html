<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="1.css">    
</head>
<body>
    <div class="registration-form">
        <h2>Регистрация</h2>
        <form action="#" method="post">
            <div class="grid-container">
                <div>
                    <label for="first-name">Имя</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                
                <div>
                    <label for="last-name">Фамилия</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
            </div>
            
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="@ example.com" required>
            
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
            
            <label for="confirm-password">Пароль повторно</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
            
            <label for="country">Страна</label>
            <select id="country" name="country" required>
                <option value="">Выберите страну</option>
                <option value="Russia" selected>Германия</option>
                <option value="America" selected>Америка</option>
                <option value="Brazil" selected>Бразилия</option>
                <option value="Germany" selected>Россия</option>
                <option value="Iraq" selected>Россия</option>
                <option value="India" selected>Россия</option>
                <option value="Japan" selected>Россия</option>
                <option value="Ukraine" selected>Россия</option>
            </select>
            
            <label class="checkbox-label">
                <input type="checkbox" id="newsletter" name="newsletter">
                Получать новости
            </label>
            
            <input type="submit" value="Регистрация">
        </form>
    </div>
</body>
</html>
