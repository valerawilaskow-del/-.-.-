<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Registration Form</title>
    <link rel="stylesheet" href="регистрация2.CSS">
</head>
<body>
    <div class="form-container">
        <h1>Responsive Registration Form</h1>
        <form action="/register" method="post">
            <div class="input-group">
                <label for="email"><span class="icon">📧</span> Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password"><span class="icon">🔒</span> Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="input-group">
                <label for="repassword"><span class="icon">🔒</span> Re-type Password</label>
                <input type="password" id="repassword" name="repassword" required>
            </div>

            <div class="input-group double">
                <div>
                    <label for="firstName"><span class="icon">👤</span> First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                <div>
                    <label for="lastName"><span class="icon">👤</span> Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
            </div>

            <div class="input-group">
                <label for="country">Select a country</label>
                <select id="country" name="country" required>
                    <option value="">Select a country</option>
                    <option value="usa">USA</option>
                    <option value="canada">Canada</option>
                    <option value="uk">UK</option>
                    <option value="australia">Australia</option>
                </select>
            </div>

            <div class="input-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree with terms and conditions</label>
            </div>

            <div class="input-group">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">I want to receive the newsletter</label>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>
    </div>
</body>
</html>
